version: 2

models:
  - name: dim_customer
    description: "Contains all customer related information, such as name and address."
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_campaign
    description: "Contains the id and name of promotional campaigns"
    columns:
      - name: campaign_key
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Contains information related to dates, such as the day of the week and month"
    columns:
      - name: quarter_of_year
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]

  - name: dim_product
    description: "Contains product id's, types, and names"
    columns:
      - name: product_key
        tests:
          - unique
          - not_null

  - name: dim_email
    description: "Contains the id and name of marketing emails"
    columns:
      - name: email_key
        tests:
          - unique
          - not_null

  - name: dim_event_type
    description: "Contains the eventtype of marketing emails"
    columns:
      - name: event_type_key
        tests:
          - unique
          - not_null

  - name: fact_email_sent
    description: "Contains information on the email, campaign, event_type, customer, date, and timestamp of promotional emails that are sent"
    columns:
      - name: customer_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

  - name: fact_order
    description: "Contains information on orders, including customer, campaign, product, date, quantity, price, and discount"
    columns:
      - name: product_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key